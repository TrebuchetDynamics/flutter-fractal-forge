name: Web preview feedback

description: Report browser-preview loading, rendering, performance, or interaction issues.

title: "[Web preview] "

labels:
  - web-preview

body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Fractal Forge's browser preview. Please include enough detail for us to reproduce the issue without guessing.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
      placeholder: "Example: The catalog loaded, but opening Mandelbrot showed a blank viewer."
    validations:
      required: true

  - type: input
    id: preview-url
    attributes:
      label: Preview URL
      placeholder: "https://fractal.trebuchetdynamics.com/"
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Landing page
        - Web app boot/onboarding
        - Catalog
        - Viewer/rendering
        - Gesture/controls
        - Deep zoom / precision fallback
        - Export/share
        - Performance
        - Other
    validations:
      required: true

  - type: input
    id: fractal
    attributes:
      label: Fractal/module name
      description: If the issue happened in the viewer, name the selected fractal.
      placeholder: "Example: Mandelbrot, Julia, 3D Fractal, Mandelbulb"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps are best.
      placeholder: |
        1. Open the preview URL
        2. Click Skip
        3. Open Mandelbrot
        4. Zoom twice
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or short video
      description: Drag and drop an image/video if visual output is wrong.
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Example: Chrome 126, Firefox 127, Safari 17"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system and device
      placeholder: "Example: Windows 11 desktop, macOS laptop, Android phone"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU / graphics info if known
      placeholder: "Example: Intel Iris Xe, NVIDIA RTX 3060, Apple M2, unknown"
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Browser console errors
      description: Paste any red console errors or network failures.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Quick checks
      options:
        - label: The landing page loaded.
          required: false
        - label: The Flutter app loaded after clicking Try web preview.
          required: false
        - label: I could skip onboarding and see the catalog.
          required: false
        - label: I could open at least one fractal in the viewer.
          required: false
