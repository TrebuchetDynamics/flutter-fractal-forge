name: CI
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Tracked artifact audit
        run: scripts/audit-tracked-artifacts.sh
      - name: Install script test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Script tests
        run: bats test/scripts/build_play_console.bats
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Fast safety tests
        run: >-
          flutter test
          test/android_edge_to_edge_boundary_test.dart
          test/precision_ladder_policy_test.dart
          test/backend_policy_comprehensive_test.dart
          test/fractal_controller_behavior_test.dart
          test/export_service_test.dart
          test/export_options_sheet_widget_test.dart
          test/share_service_boundary_test.dart
          test/viewer_export_session_test.dart
          test/features/viewer/viewer_export_feedback_test.dart
          test/catalog_id_integrity_test.dart
          test/catalog_search_widget_test.dart
          test/features/catalog/generate_live_registry_ledger_test.dart
          test/modules/generated_module_contract_test.dart
          test/modules/escape_time_shader_manifest_test.dart
          test/modules/escape_time_uniform_contract_test.dart
          test/shaders/standalone_shader_catalogs/cellular_and_stochastic_shader_assets_test.dart
          test/shader_web_compat_test.dart
