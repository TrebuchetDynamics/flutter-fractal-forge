name: Flutter QA Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tracked_artifact_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/audit-tracked-artifacts.sh

  catalog_shader_manifest_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -r scripts/research/requirements.txt
      - run: python scripts/research/forge.py doctor --strict-app-catalog

  unit_widget_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  golden_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test test/golden/

  integration_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Start emulator
        run: |
          echo "y" | sdkmanager "system-images;android-34;google_apis;x86_64"
          avdmanager create avd -n test_device -k "system-images;android-34;google_apis;x86_64" --force
          emulator -avd test_device -no-window -no-audio -no-boot-anim &
          adb wait-for-device
      - run: flutter pub get
      - run: flutter test integration_test/
