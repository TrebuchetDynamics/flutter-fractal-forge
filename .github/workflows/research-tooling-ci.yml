name: Research tooling CI

on:
  push:
    paths:
      - "scripts/research/**"
      - "test/research/**"
      - "docs/catalog/fractal_registry.yaml"
      - "lib/core/modules/base_classes/**"
      - ".github/workflows/research-tooling-ci.yml"
  pull_request:
    paths:
      - "scripts/research/**"
      - "test/research/**"
      - "docs/catalog/fractal_registry.yaml"
      - "lib/core/modules/base_classes/**"
      - ".github/workflows/research-tooling-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r scripts/research/requirements.txt
      - name: Run pytest
        run: pytest test/research -v --tb=short
      - name: Run forge doctor
        run: python3 scripts/research/forge.py doctor -v

  dart-emit-check:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r scripts/research/requirements.txt
      - name: Flutter pub get
        run: flutter pub get
      - name: Emit Dart from fixtures into a probe directory
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import yaml
          from scripts.research.admit.emit_dart import emit

          repo = Path.cwd()
          fixtures = repo / "test" / "research" / "fixtures" / "sample_candidates"
          probe_root = repo  # emit into the real app so imports of base_classes resolve

          iter_map = {
              "f_sample_mandelbrot.yaml": "escape_time",
              "f_sample_burning_ship.yaml": "escape_time",
              "f_sample_mandelbulb.yaml": "raymarch_3d",
              "f_sample_lorenz.yaml": "strange_attractor",
              "f_sample_sierpinski.yaml": "ifs",
              "f_sample_koch.yaml": "l_system",
          }

          for fname, iter_type in iter_map.items():
              with (fixtures / fname).open() as f:
                  cand = yaml.safe_load(f)
              name = cand["proposed_name"]
              id_ = "ci_probe_" + name.lower().replace(" ", "_").replace("'", "").replace("-", "_")
              reg_entry = {
                  "id": id_,
                  "name": name,
                  "category": "CI Probe",
                  "shader": f"shaders/{id_}_gpu.frag",
                  "family": None,
                  "aliases": cand.get("aliases", []),
                  "defaultPower": 2.0,
                  "defaultBailout": 2.0,
                  "defaultIterations": 500,
                  "defaultSteps": 120,
              }
              emit(cand, reg_entry, iter_type, probe_root)
              print(f"emitted: {id_}")
          PY
      - name: Flutter analyze on emitted Dart
        run: |
          flutter analyze lib/core/modules/
      - name: Cleanup emitted probe files
        if: always()
        run: |
          find lib/core/modules -type d -name "ci_probe_*" -exec rm -rf {} + || true
          find test/modules -type d -name "ci_probe_*" -exec rm -rf {} + || true
