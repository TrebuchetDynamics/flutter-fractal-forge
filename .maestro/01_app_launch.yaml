appId: com.trebuchetdynamics.fractal.forge
name: "01 — App Launch and Catalog Load"
tags:
  - smoke
  - launch
---
# App must be launched via adb before running Maestro (launchApp unreliable on emulator).
# Skip onboarding if it appears.
- extendedWaitUntil:
    visible:
      text: ".*Fractal.*"
    timeout: 60000

- tapOn:
    text: ".*Skip.*"
    optional: true

# Wait for the catalog to load.
- extendedWaitUntil:
    visible:
      text: ".*Fractal Catalog.*"
    timeout: 15000

# Verify the main catalog title is visible.
- assertVisible:
    text: ".*Fractal Catalog.*"

# Verify the search field is present (by hint text).
- assertVisible:
    text: ".*Search fractals.*"

# Verify at least one fractal category is displayed.
- assertVisible:
    text: ".*Mandelbrot.*"

# Take a screenshot of the catalog for visual review.
- takeScreenshot: "01_catalog_loaded"
