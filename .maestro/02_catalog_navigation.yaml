appId: com.trebuchetdynamics.fractal.forge
name: "02 — Catalog Navigation: Search, Scroll, Tap"
tags:
  - navigation
  - catalog
---
# App launched by run_all.sh before each test.
- extendedWaitUntil:
    visible:
      text: ".*Fractal.*"
    timeout: 90000

- tapOn:
    text: ".*Skip.*"
    optional: true

# Wait for catalog (longer timeout for swiftshader emulator).
- extendedWaitUntil:
    visible:
      text: ".*Fractal Catalog.*"
    timeout: 60000

# Step 1: Search for a fractal by name.
- tapOn:
    text: ".*Search fractals.*"

- inputText: "Julia"

# Verify search results appear.
- assertVisible:
    text: ".*Julia.*"

- takeScreenshot: "02_search_results_julia"

# Clear the search field.
- eraseText: 5

# Dismiss the keyboard so the grid can settle before scrolling.
- pressKey: back

# Step 2: Scroll down in the catalog grid.
- swipe:
    direction: UP
    duration: 1500

- takeScreenshot: "02_catalog_scrolled"

# Step 3: Scroll back up and tap on Mandelbrot.
- scrollUntilVisible:
    element:
      text: ".*Mandelbrot.*"
    direction: DOWN
    timeout: 10000

- tapOn:
    text: ".*Mandelbrot.*"

# Wait for the viewer.
- extendedWaitUntil:
    visible:
      text: ".*Mandelbrot.*"
    timeout: 10000

- takeScreenshot: "02_viewer_opened"

# Go back to catalog.
- pressKey: back
