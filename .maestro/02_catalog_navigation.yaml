appId: com.trebuchetdynamics.fractal.forge
name: "02 — Catalog Navigation: Search, Scroll, Tap"
tags:
  - navigation
  - catalog
---
- runFlow: helpers/ensure_catalog.yaml

# Search is behind a toggle in the current catalog UI.
- tapOn:
    point: "846,350"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- runFlow:
    when:
      notVisible: "Search fractals"
    commands:
      - tapOn:
          text: "Button"
          index: 0
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible:
      text: "Search fractals"
    timeout: 10000
- eraseText: 160
- setClipboard: "Aizawa Attractor"
- pasteText
- pressKey: back

- extendedWaitUntil:
    visible:
      text: ".*Aizawa Attractor fractal, 2D.*"
    timeout: 15000

- takeScreenshot: "02_search_results_aizawa"

- tapOn:
    text: ".*Aizawa Attractor fractal, 2D.*"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 750

- extendedWaitUntil:
    visible:
      text: "Controls"
    timeout: 20000

- assertVisible: "Export"
- takeScreenshot: "02_viewer_opened"

- pressKey: back

- extendedWaitUntil:
    visible:
      text: "Fractal Forge"
    timeout: 10000

- tapOn:
    point: "846,350"
    waitToSettleTimeoutMs: 500

- swipe:
    start: "50%,75%"
    end: "50%,35%"
    duration: 1000
    waitToSettleTimeoutMs: 500

- takeScreenshot: "02_catalog_scrolled"
