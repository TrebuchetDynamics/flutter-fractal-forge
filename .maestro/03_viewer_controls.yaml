appId: com.trebuchetdynamics.fractal.forge
name: "03 — Viewer Controls: Zoom, Export, Navigate"
tags:
  - viewer
  - controls
---
- runFlow: helpers/ensure_catalog.yaml

- tapOn:
    point: "846,350"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- runFlow:
    when:
      notVisible: "Search fractals"
    commands:
      - tapOn:
          text: "Button"
          index: 0
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500

- extendedWaitUntil:
    visible:
      text: "Search fractals"
    timeout: 10000

- eraseText: 160
- setClipboard: "Aizawa Attractor"
- pasteText
- pressKey: back

- extendedWaitUntil:
    visible:
      text: ".*Aizawa Attractor fractal, 2D.*"
    timeout: 15000

- tapOn:
    text: ".*Aizawa Attractor fractal, 2D.*"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 750

- extendedWaitUntil:
    visible:
      text: "Controls"
    timeout: 20000

- assertVisible: "Controls"
- assertVisible: "Random Fractal"
- assertVisible: "Export"

- takeScreenshot: "03_viewer_active"

- tapOn: "Controls"

- extendedWaitUntil:
    visible:
      text: "Controls"
    timeout: 10000

- assertVisible:
    text: "Iterations"
- assertVisible:
    text: "ACTIONS"

- takeScreenshot: "03_controls_sheet"

- pressKey: back
- waitForAnimationToEnd

- tapOn: "Random Fractal"

- extendedWaitUntil:
    visible:
      text: "Back"
    timeout: 20000

- assertVisible: "Export"

- takeScreenshot: "03_random_fractal"

- tapOn: "Back"
