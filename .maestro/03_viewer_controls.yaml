appId: com.trebuchetdynamics.fractal.forge
name: "03 — Viewer Controls: Zoom, Export, Navigate"
tags:
  - viewer
  - controls
---
# App launched by run_all.sh before each test.
- extendedWaitUntil:
    visible:
      text: ".*Fractal.*"
    timeout: 90000

- tapOn:
    text: ".*Skip.*"
    optional: true

# Wait for catalog (longer timeout for swiftshader emulator).
- extendedWaitUntil:
    visible:
      text: ".*Fractal Catalog.*"
    timeout: 60000

# Open a fractal.
- tapOn:
    text: ".*Mandelbrot.*"

- extendedWaitUntil:
    visible:
      text: ".*Mandelbrot.*"
    timeout: 10000

# Step 1: Zoom in using pinch gesture.
- swipe:
    direction: UP
    duration: 500

- takeScreenshot: "03_viewer_active"

# Step 2: Look for controls button by accessibility text.
- tapOn:
    text: ".*Controls.*"
    optional: true

- takeScreenshot: "03_controls_attempted"

# Step 3: Navigate back to catalog.
- pressKey: back
