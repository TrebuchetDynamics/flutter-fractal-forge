appId: com.trebuchetdynamics.fractal.forge
name: "04 — Export Flow: Save and Share"
tags:
  - export
  - share
---
# Skip onboarding if it appears.
- extendedWaitUntil:
    visible:
      text: ".*Fractal.*"
    timeout: 60000

- tapOn:
    text: ".*Skip.*"
    optional: true

# Wait for catalog.
- extendedWaitUntil:
    visible:
      text: ".*Fractal Catalog.*"
    timeout: 15000

# Open a fractal.
- tapOn:
    text: ".*Mandelbrot.*"

- extendedWaitUntil:
    visible:
      text: ".*Mandelbrot.*"
    timeout: 10000

# Step 1: Look for export button by accessibility text.
- tapOn:
    text: ".*Export.*"
    optional: true

- takeScreenshot: "04_export_attempted"

# Step 2: Navigate back to catalog.
- pressKey: back
