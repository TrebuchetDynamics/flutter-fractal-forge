appId: com.trebuchetdynamics.fractal.forge
name: "05 — Every Fractal Smoke: Sample Across Catalog"
tags:
  - smoke
  - every-fractal
---
# App launched by run_all.sh before each test. No launchApp to avoid driver reinstall.
#
# Strategy: Maestro cannot enumerate the 357 legacy fractals programmatically,
# so we sample a diverse set across the catalog's major categories (escape-time
# classics, 3D raymarched, attractors, IFS / L-systems, cellular automata,
# Newton variants, exotic variants). Each sample:
#   1. Types the fractal name in the search field
#   2. Taps the first matching result
#   3. Waits for the viewer (we assert the search field vanishes as the
#      viewer has no stable testID across all fractals)
#   4. Takes a screenshot
#   5. Presses back and clears the search for the next fractal
#
# Fractal IDs sampled (27 total) come verbatim from
# docs/catalog/fractal_registry.yaml names, so we match on display text.

- extendedWaitUntil:
    visible:
      text: ".*Fractal.*"
    timeout: 90000

- tapOn:
    text: ".*Skip.*"
    optional: true

- extendedWaitUntil:
    visible:
      text: ".*Fractal Catalog.*"
    timeout: 60000

- assertVisible:
    text: ".*Search fractals.*"

# ─────────────────────────────────────────────────────────────────────────────
# Sample 1: Mandelbrot (escape-time classic)
- runFlow:
    commands:
      - tapOn:
          text: ".*Search fractals.*"
      - inputText: "Mandelbrot"
      - extendedWaitUntil:
          visible:
            text: "Mandelbrot"
          timeout: 8000
      - tapOn:
          text: "Mandelbrot"
      - waitForAnimationToEnd:
          timeout: 10000
      - takeScreenshot: "05_01_mandelbrot"
      - pressKey: back
      - extendedWaitUntil:
          visible:
            text: ".*Fractal Catalog.*"
          timeout: 10000
      - eraseText: 20

