appId: com.trebuchetdynamics.fractal.forge
name: "06 — Single Fractal Probe"
env:
  FRACTAL_NAME: ${FRACTAL_NAME || "Mandelbrot"}
  FRACTAL_QUERY: ${FRACTAL_QUERY || FRACTAL_NAME || "Mandelbrot"}
  FRACTAL_CARD_REGEX: ${FRACTAL_CARD_REGEX || ".*Mandelbrot fractal, 2D.*"}
tags:
  - smoke
  - single-fractal
---
- runFlow: helpers/ensure_catalog.yaml

- tapOn:
    point: "846,350"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- runFlow:
    when:
      notVisible: "Search fractals"
    commands:
      - tapOn:
          text: "Button"
          index: 0
          retryTapIfNoChange: true
          waitToSettleTimeoutMs: 500
- extendedWaitUntil:
    visible:
      text: "Search fractals"
    timeout: 10000
- eraseText: 160
- setClipboard: ${FRACTAL_QUERY}
- pasteText
- pressKey: back

- extendedWaitUntil:
    visible:
      text: ${FRACTAL_CARD_REGEX}
    timeout: 20000

- tapOn:
    text: ${FRACTAL_CARD_REGEX}
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 750

- extendedWaitUntil:
    visible:
      text: "Controls"
    timeout: 25000

- assertVisible: "Export"

- pressKey: back

- extendedWaitUntil:
    visible:
      text: "Fractal Forge"
    timeout: 15000

# Toggle search closed so the next invocation starts from the same state and
# clears the previous query via the widget's built-in controller reset.
- tapOn:
    point: "846,350"
    waitToSettleTimeoutMs: 500
