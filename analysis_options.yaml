# Analyzer + lints configuration.
#
# Goal: keep `flutter analyze` focused on correctness (errors) and avoid blocking
# CI/dev loops on purely stylistic preferences.

# Use a minimal, non-style-heavy ruleset.
include: package:lints/recommended.yaml

analyzer:
  errors:
    # Allow temporary / intentional unused code in tests and experimental areas.
    unused_import: ignore
    unused_local_variable: ignore
    unused_element: ignore

    # Flutter/Dart deprecations are tracked separately; don't block analysis.
    deprecated_member_use: ignore

linter:
  rules:
    # Keep these disabled to avoid style churn.
    prefer_const_constructors: false
    prefer_const_literals_to_create_immutables: false
    prefer_const_declarations: false
    unnecessary_const: false
    non_constant_identifier_names: false
    curly_braces_in_flow_control_structures: false

    # Previously disabled to keep CI/static analysis from blocking.
    use_super_parameters: false
    use_build_context_synchronously: false
