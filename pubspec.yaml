name: flutter_fractals
description: GPU-accelerated fractal exploration with 350+ types, deep zoom, and real-time rendering.
publish_to: none
version: 1.1.0+38
environment:
  sdk: ^3.0.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  vector_math: ^2.1.4
  cupertino_icons: ^1.0.8
  equatable: ^2.0.5
  intl: ^0.20.2
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  share_plus: ^7.0.0
  image: ^4.0.0
  google_fonts: ^6.2.1
  m3_carousel: ^2.1.0
  meta: ^1.16.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0
  permission_handler_platform_interface: ^4.2.3
  flutter_lints: ^4.0.0
  golden_toolkit: ^0.15.0
  flutter_launcher_icons: ^0.14.3
  alchemist: ^0.10.0
  accessibility_tools: ^2.0.0
  yaml: ^3.1.2
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/ic_launcher.png
  adaptive_icon_background: "#0A0520"
  adaptive_icon_foreground: assets/icon/ic_launcher.png
