name: flutter_fractals
description: A Flutter app for rendering 3D Mandelbulb fractals with real-time interaction.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ^3.0.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  vector_math: ^2.1.4
  cupertino_icons: ^1.0.8
  equatable: ^2.0.5
  intl: any
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  share_plus: ^7.0.0
  permission_handler: ^11.0.0
  camera: ^0.10.6
  image: ^4.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  permission_handler_platform_interface: ^4.2.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/ic_launcher.png
  adaptive_icon_background: '#0A0520'
  adaptive_icon_foreground: assets/icon/ic_launcher.png
  min_sdk_android: 21
flutter:
  generate: true
  uses-material-design: true
  shaders:
  - shaders/mandelbulb.frag
  - shaders/mandelbrot.frag
  - shaders/julia.frag
  - shaders/burning_ship.frag
  - shaders/ink_sparkle.frag
